name: 构建 Linux aarch64 版 aapt2 (NDK Clang)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    name: 构建 Linux aarch64
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（包含子模块）
      - name: 检出代码及子模块
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      # 2. 安装 NDK r25c
      - name: 安装 NDK r25c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: false

      # 3. 获取 protoc
      - name: 下载并安装 protoc
        run: |
          wget https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-x86_64.zip
          sudo unzip -j protoc-*.zip bin/protoc -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/protoc

      # 4. 安装 Linux AArch64 交叉编译 sysroot（无需添加 arm64 架构）
      - name: 安装 AArch64 交叉编译库
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      # 5. 应用补丁
      - name: 应用补丁
        run: bash ./aarch64-linux-patch.sh

      # 6. 构建 aapt2
      - name: 构建 aapt2 (Linux aarch64)
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          PROTOC_PATH: /usr/local/bin/protoc
          LINUX_SYSROOT: /usr/aarch64-linux-gnu
        run: bash ./aarch64-linux-build.sh

      # 7. 上传构建产物
      - name: 上传 aapt2 可执行文件
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-linux-aarch64
          path: build_aarch64_linux/bin/aapt2
          archive: false

  # 可选：发布构建产物（与原 release.yml 类似）
  release:
    name: 发布构建产物
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - name: 检出代码（用于发布配置）
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: 生成来源证明
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/aapt2

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'

      - name: 安装 semantic-release 依赖
        run: npm install

      - name: 导入 GPG 密钥
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ vars.GPG_FINGERPRINT }}

      - name: 执行 semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec semantic-release
