name: 构建 Linux aarch64 版 aapt2

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    name: 交叉编译 Linux aarch64
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码（包含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: 安装交叉编译工具链及手动部署 arm64 版 zlib 开发文件
        run: |
          set -e
          # 直接安装 amd64 的交叉工具链（无需 update，避免 arm64 源 404）
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            ninja-build \
            wget

          # 创建临时目录并下载 arm64 的 zlib 包
          TEMP_DEB_DIR=$(mktemp -d)
          cd "$TEMP_DEB_DIR"

          wget http://ports.ubuntu.com/pool/main/z/zlib/zlib1g_1.3.dfsg+really1.3.1-1ubuntu2_arm64.deb
          wget http://ports.ubuntu.com/pool/main/z/zlib/zlib1g-dev_1.3.dfsg+really1.3.1-1ubuntu2_arm64.deb

          # 强制安装 arm64 包（忽略架构警告）
          sudo dpkg -i --force-depends zlib1g_1.3.dfsg+really1.3.1-1ubuntu2_arm64.deb
          sudo dpkg -i --force-depends zlib1g-dev_1.3.dfsg+really1.3.1-1ubuntu2_arm64.deb

          cd /
          rm -rf "$TEMP_DEB_DIR"

      - name: 获取 protoc 编译器
        run: |
          wget https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-x86_64.zip
          sudo unzip -j protoc-*.zip bin/protoc -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/protoc

      - name: 应用构建前补丁
        run: bash ./aarch64-linux-patch.sh

      - name: 配置并编译 aapt2
        env:
          PROTOC_PATH: /usr/local/bin/protoc
          SYSROOT: /usr/aarch64-linux-gnu
        run: bash ./aarch64-linux-build.sh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-linux-aarch64
          path: build_aarch64_linux/bin/aapt2
          archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: aapt2-linux-aarch64
          path: artifacts/

      - name: 生成构建来源证明（仅当推送 main 分支时）
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/aapt2

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'

      - name: 安装语义发布依赖
        run: npm install

      - name: 导入 GPG 密钥
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ vars.GPG_FINGERPRINT }}

      - name: 执行语义发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec semantic-release
