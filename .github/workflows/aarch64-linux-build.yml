# .github/workflows/aarch64-linux-build.yml
# GitHub Actions 工作流：编译 aarch64-linux-gnu 平台的 aapt2，并进行基本验证

name: AArch64 Linux Build

on:
  workflow_dispatch:          # 允许手动触发
  push:
    branches: [ main, dev ]   # 主分支推送时自动构建

jobs:
  build:
    name: Build aapt2 for aarch64-linux-gnu
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码及子模块
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0       # 确保获取完整历史，以便应用补丁

      # 2. 安装依赖工具
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            protobuf-compiler \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libstdc++-arm64-cross \
            qemu-user-static   # 用于运行 aarch64 二进制以验证版本

      # 3. 安装特定版本的 protoc（与原 release.yml 保持一致）
      - name: Install protoc 21.12
        run: |
          wget https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-x86_64.zip
          sudo unzip -j protoc-21.12-linux-x86_64.zip bin/protoc -d /usr/local/bin/
          rm protoc-21.12-linux-x86_64.zip
          protoc --version

      # 4. 验证交叉编译工具链
      - name: Verify cross-compiler
        run: |
          aarch64-linux-gnu-gcc --version
          aarch64-linux-gnu-g++ --version
          echo "sysroot: $(aarch64-linux-gnu-gcc -print-sysroot)"

      # 5. 应用 Linux 平台补丁
      - name: Apply Linux-specific patches
        run: |
          chmod +x ./aarch64-linux-patch.sh
          ./aarch64-linux-patch.sh

      # 6. 构建 aapt2
      - name: Build aapt2 for aarch64-linux
        run: |
          chmod +x ./aarch64-linux-build.sh
          ./aarch64-linux-build.sh

      # 7. 验证生成的可执行文件
      - name: Verify executable type
        run: |
          file build-linux/bin/aapt2
          # 期望输出包含 "ELF 64-bit LSB executable, ARM aarch64"

      # 8. 使用 QEMU 用户态模拟运行 aapt2 version
      - name: Test aapt2 version under QEMU
        run: |
          qemu-aarch64-static ./build-linux/bin/aapt2 version
          # 输出应类似 "aapt2 35.0.2-..." 表示成功

      # 9. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-aarch64-linux
          path: ${{ github.workspace }}/build-linux/bin/aapt2
          if-no-files-found: error
          retention-days: 7

