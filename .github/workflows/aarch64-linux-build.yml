name: Build aarch64 Linux aapt2

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-aarch64:
    name: 交叉编译 aarch64 Linux 版 aapt2
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 安装基础工具
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake file

      - name: 获取 protoc
        run: |
          PROTOC_VERSION="21.12"
          wget -q "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -j "protoc-${PROTOC_VERSION}-linux-x86_64.zip" bin/protoc -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/protoc
          echo "PROTOC_PATH=/usr/local/bin/protoc" >> $GITHUB_ENV

      - name: 下载 Linaro 交叉编译工具链
        run: |
          TOOLCHAIN_URL="https://releases.linaro.org/components/toolchain/binaries/7.5-2019.12/aarch64-linux-gnu/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu.tar.xz"
          wget -q "${TOOLCHAIN_URL}"
          tar -xf gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu.tar.xz
          echo "TOOLCHAIN_DIR=$PWD/gcc-linaro-7.5.0-2019.12-x86_64_aarch64-linux-gnu" >> $GITHUB_ENV

      - name: 应用补丁
        run: |
          chmod +x ./aarch64-linux-patch.sh
          ./aarch64-linux-patch.sh

      - name: 构建 aapt2
        run: |
          chmod +x ./aarch64-linux-build.sh
          ./aarch64-linux-build.sh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-linux-aarch64
          path: build-linux-aarch64/bin/aapt2
          if-no-files-found: error
          retention-days: 30
