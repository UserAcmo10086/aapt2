name: 构建 Linux aarch64 版 aapt2

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    name: 交叉编译 Linux aarch64
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码（包含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: 安装 GCC 12 交叉编译工具链并部署 arm64 版 zlib
        run: |
          set -e
          # 安装 GCC 12 交叉编译器及相关工具
          sudo apt-get install -y \
            gcc-12-aarch64-linux-gnu \
            g++-12-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            ninja-build \
            wget

          # 创建软链接以便直接使用 gcc-12 等名称（可选，但构建脚本会直接使用带版本号的编译器）
          # 我们将在 build.sh 中显式指定编译器为 aarch64-linux-gnu-gcc-12

          # 手动部署 zlib arm64 库
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"

          wget http://ports.ubuntu.com/pool/main/z/zlib/zlib1g_1.3.dfsg+really1.3.1-1ubuntu2_arm64.deb
          wget http://ports.ubuntu.com/pool/main/z/zlib/zlib1g-dev_1.3.dfsg+really1.3.1-1ubuntu2_arm64.deb

          dpkg-deb -x zlib1g_1.3.dfsg+really1.3.1-1ubuntu2_arm64.deb zlib1g
          dpkg-deb -x zlib1g-dev_1.3.dfsg+really1.3.1-1ubuntu2_arm64.deb zlib1g-dev

          sudo cp -v zlib1g-dev/usr/include/*.h /usr/aarch64-linux-gnu/include/
          sudo cp -v zlib1g/usr/lib/aarch64-linux-gnu/libz.so.* /usr/aarch64-linux-gnu/lib/
          sudo cp -v zlib1g-dev/usr/lib/aarch64-linux-gnu/libz.a /usr/aarch64-linux-gnu/lib/

          cd /usr/aarch64-linux-gnu/lib
          sudo ln -sf libz.so.1.3 libz.so.1
          sudo ln -sf libz.so.1 libz.so

          cd /
          rm -rf "$TEMP_DIR"

      - name: 获取 protoc 编译器
        run: |
          wget https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-x86_64.zip
          sudo unzip -j protoc-*.zip bin/protoc -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/protoc

      - name: 应用构建前补丁
        run: bash ./aarch64-linux-patch.sh

      - name: 配置并编译 aapt2
        env:
          PROTOC_PATH: /usr/local/bin/protoc
        run: bash ./aarch64-linux-build.sh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-linux-aarch64
          path: build_aarch64_linux/bin/aapt2
          archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: aapt2-linux-aarch64
          path: artifacts/

      - name: 生成构建来源证明（仅当推送 main 分支时）
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/aapt2

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'

      - name: 安装语义发布依赖
        run: npm install

      - name: 导入 GPG 密钥
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ vars.GPG_FINGERPRINT }}

      - name: 执行语义发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec semantic-release
