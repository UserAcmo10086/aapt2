name: Build aarch64 Linux aapt2

on:
  workflow_dispatch:          # 允许手动触发
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  build-linux-aarch64:
    name: 交叉编译 aarch64 Linux 版 aapt2
    runs-on: ubuntu-22.04      # 使用较新但稳定的 Ubuntu 环境
    strategy:
      fail-fast: false
      matrix:
        # 仅构建 aarch64 架构
        target: [aarch64]
    steps:
      - name: 检出代码（包含子模块）
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'   # 递归拉取所有子模块

      - name: 安装交叉编译工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            ninja-build \
            cmake \
            file
          # 验证安装
          aarch64-linux-gnu-gcc --version
          aarch64-linux-gnu-g++ --version

      - name: 获取 protoc（主机工具）
        run: |
          # 下载与构建环境匹配的 x86_64 Linux 版 protoc
          PROTOC_VERSION="21.12"
          wget -q "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -j "protoc-${PROTOC_VERSION}-linux-x86_64.zip" bin/protoc -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/protoc
          # 验证 protoc
          protoc --version
          # 设置环境变量供后续步骤使用
          echo "PROTOC_PATH=/usr/local/bin/protoc" >> $GITHUB_ENV

      - name: 应用针对 Linux aarch64 的补丁
        run: |
          chmod +x ./aarch64-linux-patch.sh
          ./aarch64-linux-patch.sh

      - name: 配置并构建 aapt2
        run: |
          chmod +x ./aarch64-linux-build.sh
          # 设置交叉编译前缀（与系统安装的一致）
          export CROSS_COMPILE=aarch64-linux-gnu-
          ./aarch64-linux-build.sh

      - name: 验证生成的可执行文件
        run: |
          OUTPUT_BIN="build-linux-aarch64/bin/aapt2"
          if [[ -f "$OUTPUT_BIN" ]]; then
            echo "生成的可执行文件信息："
            file "$OUTPUT_BIN"
            # 尝试用 QEMU 用户模式运行 version 命令进行简单验证
            sudo apt-get install -y qemu-user-static
            qemu-aarch64-static "$OUTPUT_BIN" version || echo "警告：无法在 QEMU 中运行 version 命令，但文件已生成。"
          else
            echo "错误：未找到可执行文件 $OUTPUT_BIN"
            exit 1
          fi

      - name: 上传构建产物（不压缩，直接提供二进制）
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-linux-aarch64
          path: build-linux-aarch64/bin/aapt2
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build-linux-aarch64
    runs-on: ubuntu-22.04
    # 仅在推送到主分支时自动发布，手动触发也可发布
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write          # 允许创建 Release
      id-token: write          # 用于生成来源证明（可选）
      attestations: write
    steps:
      - name: 检出代码（仅用于获取发布配置）
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: aapt2-linux-aarch64
          path: ./release-artifacts/

      - name: 生成来源证明（可选）
        if: ${{ success() }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ./release-artifacts/aapt2

      - name: 计算 SHA256 校验和
        run: |
          cd ./release-artifacts
          sha256sum aapt2 > aapt2.sha256

      - name: 设置 Node.js 环境（用于 semantic-release）
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: 安装 semantic-release 依赖
        run: |
          npm install -g semantic-release @semantic-release/git @semantic-release/github @semantic-release/exec

      - name: 创建或更新 GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 如果没有配置 semantic-release，则手动创建简单的 Release
          if [[ ! -f ".releaserc" ]] && [[ ! -f "package.json" ]]; then
            echo "未检测到 semantic-release 配置，使用 GitHub CLI 手动创建 Release。"
            TAG_NAME="aapt2-linux-aarch64-$(date +%Y%m%d%H%M%S)"
            RELEASE_NAME="aapt2 for Linux aarch64 - $(date +%Y-%m-%d)"
            gh release create "$TAG_NAME" \
              --title "$RELEASE_NAME" \
              --notes "自动构建的 aarch64 Linux 版 aapt2 可执行文件。\n\n- 构建时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')\n- 提交 SHA: ${GITHUB_SHA}" \
              ./release-artifacts/*
          else
            echo "使用 semantic-release 进行发布..."
            npx semantic-release
          fi
